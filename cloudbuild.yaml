steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--no-cache"
      - "-t"
      - "$_CONTAINER_REPO/$_IMAGE_NAME:code$COMMIT_SHA"
      - "-t"
      - "$_CONTAINER_REPO/$_IMAGE_NAME:latest"
      - $_ROOT_DIR
    id: Build
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_CONTAINER_REPO/$_IMAGE_NAME:code$COMMIT_SHA"
    id: Push
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - workstations
      - configs
      - update
      - $_WORKSTATION_CONFIG
      - --project=$_WORKSTATION_PROJECT
      - --region=$_WORKSTATION_REGION
      - --cluster=$_WORKSTATION_CLUSTER
      - --container-custom-image=$_CONTAINER_REPO/$_IMAGE_NAME:code$COMMIT_SHA
    id: Update Workstation Config
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - workstations
      - stop
      - $_WORKSTATION_NAME
      - --project=$_WORKSTATION_PROJECT
      - --region=$_WORKSTATION_REGION
      - --cluster=$_WORKSTATION_CLUSTER
      - --config=$_WORKSTATION_CONFIG
    id: Stop Workstation
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - workstations
      - start
      - $_WORKSTATION_NAME
      - --project=$_WORKSTATION_PROJECT
      - --region=$_WORKSTATION_REGION
      - --cluster=$_WORKSTATION_CLUSTER
      - --config=$_WORKSTATION_CONFIG
    id: Start Workstation
images:
  - "$_CONTAINER_REPO/$_IMAGE_NAME:code$COMMIT_SHA"
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE_NAME: workstation-image
  _CONTAINER_REPO: europe-west1-docker.pkg.dev/mattsday-home/home
  _ROOT_DIR: .
  _WORKSTATION_NAME: matt-workstation
  _WORKSTATION_CONFIG: config-m6klszcj
  _WORKSTATION_CLUSTER: cluster-lrf5clfq
  _WORKSTATION_REGION: europe-west2
  _WORKSTATION_PROJECT: matt-day-dev